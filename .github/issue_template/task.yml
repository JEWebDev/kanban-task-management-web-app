name: Technical Task
description: Track backend, database, or refactoring tasks
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this task needed?
    validations:
      required: true
  - type: textarea
    id: technical-details
    attributes:
      label: Technical Considerations
      description: Libraries, database schema changes, or logic implementation details.
  - type: checkboxes
    id: dod
    attributes:
      label: Definition of Done
      options:
        - label: Code is written and tested
        - label: Database migrations are verified
        - label: Documentation is updated
